name: gen_agents
modality: text_only

llm_model: qwen/qwen3-vl-8b-instruct
llm_api_key: ""
llm_api_key_env: OPENROUTER_API_KEY
llm_base_url: https://openrouter.ai/api/v1

# Embedding still uses OpenAI API (text-embedding-3-small)
embedding_model: all-MiniLM-L6-v2

retrieve_k: 10
caption_preprocessed: true
llm_temperature: 0.0
importance_post_scale: 10.0
reflection_threshold: 8.0
reflection_topk: 2
reflection_question_number: 2
reflection_insight_number: 2
recency_decay: 0.995
recall_truncation_words: 4000
